services:
  springboot-start:
    container_name: springboot-start
    image: springboot-start:latest
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-start:3306/twitterdb
      - SPRING_DATASOURCE_USERNAME=dev
      - SPRING_DATASOURCE_PASSWORD=dev123
    networks:
      - twitter-network
    depends_on:
      - mysql-start

  mysql-start:
      container_name: mysql-start
      image: mysql:9.3
      environment:
        MYSQL_ROOT_PASSWORD: root123
        MYSQL_DATABASE: twitterdb
        MYSQL_USER: dev
        MYSQL_PASSWORD: dev123
      ports:
        - "3306:3306"
      networks:
        - twitter-network
networks:
  twitter-network:
    driver: bridge